version: 2.1

orbs:
  ruby: circleci/ruby@2.5.2
  coveralls: coveralls/coveralls@2.2.5

jobs:
  rubocop:
    docker:
      - image: cimg/ruby:3.4.2
    steps:
      - checkout
      - ruby/install-deps
      - run: bundle exec rubocop
  test:
    docker:
      - image: cimg/ruby:3.4.2-node
    steps:
      - checkout
      - ruby/install-deps
      - ruby/rspec-test:
          include: spec/**/*_spec.rb
      - coveralls/upload:
          coverage_file: ./coverage/lcov/project.lcov
  bearer:
    docker:
      - image: cimg/ruby:3.4.2
    environment:
      # Set to default branch of your repo
      DEFAULT_BRANCH: main
      BEARER_VERSION: 2.0.2
      BEARER_SHA256: 865c80c5f80aaca1f83e98bca4decb0fd5b5d024e13f8ec48e94d69430d0d23b
    steps:
      - checkout
      - run:
          name: Install Bearer (pinned version, checksum-verified)
          command: |
            curl -sfL -o /tmp/bearer.tar.gz "https://github.com/Bearer/bearer/releases/download/v${BEARER_VERSION}/bearer_${BEARER_VERSION}_linux_amd64.tar.gz"
            echo "${BEARER_SHA256}  /tmp/bearer.tar.gz" | sha256sum -c -
            tar -xzf /tmp/bearer.tar.gz -C /tmp bearer
      - run: CURRENT_BRANCH=$CIRCLE_BRANCH SHA=$CIRCLE_SHA1 /tmp/bearer scan .
  semgrep:
    docker:
        - image: returntocorp/semgrep
    steps:
      - checkout
      - run:
          name: Check code against community-provided and custom semgrep rules
          command: semgrep ci --config auto
workflows:
  build_and_test:
    jobs:
      - rubocop
      - test
      - bearer
      - semgrep
